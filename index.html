<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>THE BOYZ · 与你相遇</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#07101f;--deep:#0d1929;--card:#111e33;--card2:#162440;
  --border:#1a2d4a;--border2:#223659;
  --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
  --pink:#e879a0;--pink2:#f9a8cc;
  --gold:#c9a464;--gold2:#e8c97a;
  --text:#cdd9ee;--text2:#a0b4cc;--muted:#5a7a9a;
  --white:#eef4ff;
  --red:#e05252;--green:#3dbc8a;
  --glass:rgba(13,25,41,0.85);
  --glassborder:rgba(255,255,255,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--navy);color:var(--text);font-family:'Noto Sans SC',sans-serif;}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9999;}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;pointer-events:none;filter:blur(90px);opacity:.10;}
.orb1{width:500px;height:500px;background:radial-gradient(#1d4ed8,transparent);top:-200px;right:-150px;}
.orb2{width:400px;height:400px;background:radial-gradient(#7c3aed,transparent);bottom:-150px;left:-100px;}
.orb3{width:300px;height:300px;background:radial-gradient(#be185d,transparent);top:40%;left:60%;}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column;overflow:hidden;z-index:1;}
.screen.active{display:flex;}

/* ───────────────────────────────────────────
   TITLE SCREEN
─────────────────────────────────────────── */
#s-title{align-items:center;justify-content:center;padding:40px 24px;text-align:center;
  background:linear-gradient(160deg,#07101f 0%,#0d1929 60%,#0a1628 100%);}
.title-eyebrow{font-size:10px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;
  border:1px solid rgba(201,164,100,.25);padding:5px 16px;border-radius:20px;
  margin-bottom:28px;animation:fadeUp .8s both;}
.title-h1{font-family:'Playfair Display',serif;font-size:clamp(44px,11vw,80px);
  font-weight:700;color:var(--white);line-height:1.05;margin-bottom:6px;
  animation:fadeUp .8s .15s both;}
.title-h1 em{font-style:italic;color:var(--blue3);}
.title-jp{font-size:clamp(12px,3vw,16px);letter-spacing:10px;color:var(--blue3);
  margin-bottom:36px;animation:fadeUp .8s .3s both;}
.title-desc{max-width:360px;font-size:13px;line-height:2;color:var(--text2);
  margin-bottom:44px;animation:fadeUp .8s .45s both;}
.btn-primary{background:linear-gradient(135deg,#1d4ed8,#2563eb);border:none;color:#fff;
  padding:15px 44px;border-radius:14px;font-family:'Noto Serif SC',serif;font-size:15px;
  letter-spacing:3px;cursor:pointer;transition:all .3s;box-shadow:0 8px 32px rgba(37,99,235,.35);
  animation:fadeUp .8s .6s both;}
.btn-primary:active{transform:scale(.97);}
.title-stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) var(--del,0s) infinite;}
@keyframes twinkle{0%,100%{opacity:.1}50%{opacity:.7}}

/* ───────────────────────────────────────────
   SETUP SCREENS
─────────────────────────────────────────── */
#s-member,#s-identity{background:var(--navy);overflow-y:auto;-webkit-overflow-scrolling:touch;}
.setup-wrap{min-height:100%;padding:60px 20px 40px;max-width:480px;margin:0 auto;}
.setup-back{position:fixed;top:0;left:0;right:0;padding:16px 20px;
  background:rgba(7,16,31,.9);backdrop-filter:blur(12px);z-index:10;
  display:flex;align-items:center;gap:10px;}
.back-btn{background:none;border:none;color:var(--text2);font-size:22px;cursor:pointer;padding:4px;}
.setup-label{font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
.setup-h2{font-family:'Playfair Display',serif;font-size:28px;color:var(--white);margin:12px 0 6px;}
.setup-sub{font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:28px;}

.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:16px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.member-card::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--blue),transparent);opacity:0;transition:.2s;}
.member-card.sel{border-color:var(--blue2);}
.member-card.sel::before{opacity:.15;}
.member-card:active{transform:scale(.97);}
.mc-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--white);font-weight:700;}
.mc-kr{font-size:11px;color:var(--blue3);margin:2px 0 6px;letter-spacing:1px;}
.mc-desc{font-size:11px;color:var(--text2);line-height:1.6;}
.mc-check{position:absolute;top:10px;right:10px;width:18px;height:18px;
  border-radius:50%;background:var(--blue2);display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#fff;opacity:0;transition:.2s;}
.member-card.sel .mc-check{opacity:1;}

.identity-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
.identity-item{background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;}
.identity-item.sel{border-color:var(--pink);}
.identity-item:active{transform:scale(.98);}
.ii-icon{width:40px;height:40px;border-radius:10px;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ii-text .ii-title{font-size:14px;color:var(--white);font-weight:500;}
.ii-text .ii-sub{font-size:11px;color:var(--text2);margin-top:2px;line-height:1.5;}

/* ───────────────────────────────────────────
   GAME SCREEN
─────────────────────────────────────────── */
#s-game{background:var(--navy);}

/* Header */
.g-header{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 10px;border-bottom:1px solid var(--border);
  background:rgba(7,16,31,.92);backdrop-filter:blur(14px);flex-shrink:0;z-index:10;}
.g-header-left{display:flex;flex-direction:column;gap:2px;}
.g-member-name{font-family:'Playfair Display',serif;font-size:16px;color:var(--white);}
.g-chapter{font-size:10px;letter-spacing:2px;color:var(--muted);}
.g-stats{display:flex;gap:10px;}
.g-stat{display:flex;flex-direction:column;align-items:center;gap:3px;}
.g-stat-label{font-size:8px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
.g-stat-bar{width:42px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.g-stat-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.fill-aff{background:linear-gradient(90deg,#be185d,#ec4899);}
.fill-trust{background:linear-gradient(90deg,#1d4ed8,#60a5fa);}
.fill-risk{background:linear-gradient(90deg,#d97706,#ef4444);}
.g-stat-num{font-size:9px;color:var(--text2);}
.g-menu-btn{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px 8px;}

/* Chat */
.g-chat{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px 140px;}

/* Messages */
.msg-row{display:flex;gap:8px;margin-bottom:14px;animation:msgIn .35s ease both;}
.msg-row.player{flex-direction:row-reverse;}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg-avi{width:32px;height:32px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;
  font-family:'Playfair Display',serif;color:#fff;align-self:flex-end;}
.msg-body{max-width:78%;}
.msg-sender{font-size:10px;color:var(--muted);margin-bottom:4px;letter-spacing:.5px;}
.msg-row.player .msg-sender{text-align:right;}
.msg-bubble{padding:11px 14px;border-radius:4px 16px 16px 16px;
  font-size:13.5px;line-height:1.75;position:relative;}
.msg-row.npc .msg-bubble{background:var(--card2);border:1px solid var(--border);color:var(--text);}
.msg-row.player .msg-bubble{background:rgba(37,99,235,.18);border:1px solid rgba(96,165,250,.2);
  color:var(--blue3);border-radius:16px 4px 16px 16px;}
.msg-row.system .msg-bubble{background:rgba(201,164,100,.07);border:1px solid rgba(201,164,100,.15);
  color:rgba(201,164,100,.75);border-radius:10px;font-family:'Noto Serif SC',serif;font-size:12px;
  line-height:1.9;font-style:italic;}
.msg-row.system{justify-content:center;}
.msg-row.system .msg-body{max-width:92%;}
.msg-bubble .stat-tag{display:inline-flex;align-items:center;gap:3px;
  font-size:10px;padding:2px 7px;border-radius:8px;margin-top:6px;margin-right:4px;}
.stat-tag.up{color:#3dbc8a;background:rgba(61,188,138,.1);}
.stat-tag.down{color:#e05252;background:rgba(224,82,82,.1);}
.stat-tags{margin-top:4px;}

/* Scene block */
.scene-block{background:rgba(201,164,100,.06);border-left:2px solid var(--gold);
  border-radius:0 8px 8px 0;padding:12px 16px;margin-bottom:14px;
  font-family:'Noto Serif SC',serif;font-size:12px;line-height:2;
  color:rgba(201,164,100,.75);animation:msgIn .35s ease both;}

/* Event cards */
.event-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;
  padding:16px;margin-bottom:14px;animation:msgIn .35s ease both;}
.event-card .ev-type{font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
.event-card .ev-title{font-size:14px;color:var(--white);font-weight:500;margin-bottom:6px;}
.event-card .ev-body{font-size:12px;color:var(--text2);line-height:1.7;}

/* Group chat */
.group-header{display:flex;align-items:center;gap:8px;padding:8px 14px;
  background:var(--card2);border-radius:10px 10px 0 0;border:1px solid var(--border);
  border-bottom:none;margin-bottom:0;font-size:12px;color:var(--text2);}
.group-body{background:var(--card);border:1px solid var(--border);border-radius:0 0 10px 10px;
  padding:10px 14px;margin-bottom:14px;}
.group-msg{display:flex;gap:6px;margin-bottom:8px;}
.group-msg-avi{width:24px;height:24px;border-radius:50%;background:var(--card2);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text2);flex-shrink:0;}
.group-msg-body .gm-name{font-size:10px;color:var(--blue3);margin-bottom:2px;}
.group-msg-body .gm-text{font-size:12px;color:var(--text);line-height:1.6;}

/* Phone call */
.phone-card{background:linear-gradient(160deg,#0d2040,#0a1628);
  border:1px solid var(--border2);border-radius:18px;padding:24px 20px;
  margin-bottom:14px;text-align:center;animation:msgIn .35s ease both;}
.phone-icon{font-size:36px;margin-bottom:10px;}
.phone-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);margin-bottom:4px;}
.phone-status{font-size:11px;color:var(--blue3);letter-spacing:2px;margin-bottom:16px;}
.phone-transcript{text-align:left;font-size:12px;line-height:1.9;color:var(--text2);
  background:rgba(0,0,0,.2);border-radius:10px;padding:12px;}

/* Night SMS */
.sms-card{background:linear-gradient(160deg,#1a0d2a,#0d1629);
  border:1px solid rgba(120,80,160,.3);border-radius:14px;padding:16px;
  margin-bottom:14px;animation:msgIn .35s ease both;}
.sms-time{font-size:10px;color:rgba(180,120,220,.6);text-align:center;margin-bottom:10px;letter-spacing:2px;}
.sms-row{display:flex;gap:8px;margin-bottom:8px;}
.sms-row.right{flex-direction:row-reverse;}
.sms-bubble{font-size:12.5px;line-height:1.7;padding:10px 13px;border-radius:14px;max-width:80%;}
.sms-row:not(.right) .sms-bubble{background:rgba(255,255,255,.07);color:var(--text);}
.sms-row.right .sms-bubble{background:rgba(37,99,235,.25);color:var(--blue3);}

/* Choices */
.choices-wrap{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(7,16,31,1) 50%,transparent);
  padding:12px 14px 28px;z-index:20;}
.choices-label{font-size:9px;letter-spacing:2px;color:var(--muted);text-align:center;margin-bottom:8px;}
.choice-btn{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border2);
  color:var(--text);padding:12px 16px;border-radius:11px;
  font-family:'Noto Sans SC',sans-serif;font-size:13px;line-height:1.5;
  text-align:left;cursor:pointer;margin-bottom:7px;transition:all .2s;
  display:flex;align-items:center;gap:10px;}
.choice-btn:last-child{margin-bottom:0;}
.choice-btn:active{border-color:var(--blue2);background:rgba(37,99,235,.1);transform:scale(.99);}
.choice-num{width:20px;height:20px;border-radius:50%;background:var(--border2);
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0;}
.choice-hint{font-size:10px;padding:2px 7px;border-radius:8px;margin-left:auto;flex-shrink:0;}
.hint-sweet{background:rgba(236,72,153,.12);color:#f9a8cc;}
.hint-risk{background:rgba(239,68,68,.12);color:#fca5a5;}
.hint-trust{background:rgba(59,130,246,.12);color:#93c5fd;}
.hint-bold{background:rgba(201,164,100,.12);color:var(--gold2);}

/* Continue btn */
.continue-btn{width:100%;background:transparent;border:1px solid var(--border);
  color:var(--muted);padding:11px;border-radius:11px;font-size:13px;cursor:pointer;
  letter-spacing:1px;transition:all .2s;}
.continue-btn:active{border-color:var(--blue);color:var(--blue3);}

/* ── MENU OVERLAY ── */
#s-menu{background:rgba(7,16,31,.95);backdrop-filter:blur(20px);z-index:50;
  align-items:center;justify-content:center;padding:40px 24px;}
.menu-card{background:var(--card);border:1px solid var(--border2);border-radius:18px;
  padding:24px;width:100%;max-width:320px;}
.menu-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--white);
  text-align:center;margin-bottom:20px;}
.menu-item{width:100%;background:none;border:1px solid var(--border);border-radius:10px;
  color:var(--text);padding:12px 16px;font-size:13px;cursor:pointer;margin-bottom:8px;
  text-align:left;display:flex;align-items:center;gap:10px;transition:.2s;}
.menu-item:active{background:var(--card2);}
.menu-item .mi-icon{font-size:16px;}

/* ── SAVE/LOAD ── */
#s-save{background:rgba(7,16,31,.97);backdrop-filter:blur(20px);z-index:50;
  align-items:center;padding:60px 20px 40px;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.save-wrap{width:100%;max-width:400px;}
.save-h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--white);margin-bottom:4px;}
.save-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.save-slot{background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.save-slot:active{background:var(--card2);}
.slot-icon{font-size:22px;}
.slot-info .slot-title{font-size:13px;color:var(--white);}
.slot-info .slot-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.slot-action{margin-left:auto;font-size:11px;color:var(--blue3);
  border:1px solid rgba(96,165,250,.3);padding:4px 10px;border-radius:8px;}

/* ── ENDING SCREEN ── */
#s-ending{background:var(--navy);align-items:center;justify-content:center;
  padding:40px 24px;text-align:center;}
.ending-badge{font-size:64px;margin-bottom:20px;animation:fadeUp .8s both;}
.ending-title{font-family:'Playfair Display',serif;font-size:30px;color:var(--white);
  margin-bottom:12px;animation:fadeUp .8s .15s both;}
.ending-sub{font-size:13px;color:var(--gold);letter-spacing:2px;margin-bottom:20px;
  animation:fadeUp .8s .3s both;}
.ending-desc{font-size:14px;color:var(--text2);line-height:2;max-width:340px;
  margin-bottom:36px;animation:fadeUp .8s .45s both;white-space:pre-line;}
.ending-stats{display:flex;gap:20px;justify-content:center;margin-bottom:32px;
  animation:fadeUp .8s .6s both;}
.e-stat{text-align:center;}
.e-stat-num{font-family:'Playfair Display',serif;font-size:28px;color:var(--blue3);}
.e-stat-label{font-size:10px;color:var(--muted);letter-spacing:1px;}

/* ── LOADING ── */
.loading-dots{display:flex;gap:5px;padding:12px 16px;background:var(--card2);
  border:1px solid var(--border);border-radius:4px 14px 14px 14px;width:fit-content;}
.loading-dots span{width:6px;height:6px;background:var(--muted);border-radius:50%;
  animation:dp 1.2s ease infinite;}
.loading-dots span:nth-child(2){animation-delay:.2s;}
.loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* ── TRANSITIONS ── */
.screen{transition:opacity .3s;}
.screen:not(.active){opacity:0;pointer-events:none;}

/* ── UTILS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.divider{height:1px;background:var(--border);margin:12px 0;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── CHAPTER TITLE OVERLAY ── */
.chapter-overlay{position:fixed;inset:0;background:rgba(7,16,31,.95);z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:40px;pointer-events:none;opacity:0;transition:opacity .5s;}
.chapter-overlay.show{opacity:1;}
.chapter-overlay.hide{opacity:0;}
.co-num{font-size:11px;letter-spacing:5px;color:var(--gold);margin-bottom:12px;text-transform:uppercase;}
.co-title{font-family:'Playfair Display',serif;font-size:clamp(26px,7vw,42px);color:var(--white);
  line-height:1.2;margin-bottom:10px;}
.co-sub{font-size:13px;color:var(--blue3);letter-spacing:2px;}
</style>
</head>
<body>

<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>

<!-- CHAPTER OVERLAY -->
<div class="chapter-overlay" id="chapterOverlay">
  <div class="co-num" id="coNum"></div>
  <div class="co-title" id="coTitle"></div>
  <div class="co-sub" id="coSub"></div>
</div>

<!-- ═══════════════ TITLE ═══════════════ -->
<div class="screen active" id="s-title">
  <div class="title-stars" id="titleStars"></div>
  <div class="title-eyebrow">THE BOYZ · PARALLEL WORLD</div>
  <h1 class="title-h1">与<em>你</em><br>相遇</h1>
  <p class="title-jp">平行世界 · 与他相遇</p>
  <p class="title-desc">你只是一个普通人。<br>他的世界有镁光灯、有合约、有数万双眼睛盯着他。<br>你们之间隔着很多东西——<br>但某个深夜，他还是给你发了消息。</p>
  <button class="btn-primary" onclick="goTo('s-member')">开始故事</button>
</div>

<!-- ═══════════════ MEMBER SELECT ═══════════════ -->
<div class="screen" id="s-member">
  <div class="setup-back">
    <button class="back-btn" onclick="goTo('s-title')">←</button>
    <span class="setup-label">选择角色</span>
  </div>
  <div class="setup-wrap" style="padding-top:70px;">
    <h2 class="setup-h2">他是谁？</h2>
    <p class="setup-sub">选择 THE BOYZ 的一位成员，故事将围绕你们展开。</p>
    <div class="member-grid" id="memberGrid"></div>
    <button class="btn-primary" style="width:100%;margin-top:4px;" onclick="confirmMember()" id="btnConfirmMember" disabled>确认选择</button>
  </div>
</div>

<!-- ═══════════════ IDENTITY SELECT ═══════════════ -->
<div class="screen" id="s-identity">
  <div class="setup-back">
    <button class="back-btn" onclick="goTo('s-member')">←</button>
    <span class="setup-label">选择身份</span>
  </div>
  <div class="setup-wrap" style="padding-top:70px;">
    <h2 class="setup-h2">你是谁？</h2>

<script>
// ══════════════════════════════════════════════════════
// DATA: MEMBERS
// ══════════════════════════════════════════════════════
const MEMBERS = [
  {id:'sangyeon',name:'Sangyeon',kr:'상연',color:'#3b82f6',
   desc:'队长，成熟稳重，有点距离感，极度负责任',
   personality:'内敛，话不多但每句都有分量，对感情极度谨慎'},
  {id:'jacob',name:'Jacob',kr:'제이콥',color:'#10b981',
   desc:'温柔的加拿大人，总是认真倾听，有治愈感',
   personality:'暖男，但偶尔流露出思乡的孤独，情感细腻'},
  {id:'younghoon',name:'Younghoon',kr:'영훈',color:'#8b5cf6',
   desc:'话不多但眼神很深，努力的实力派演员',
   personality:'沉默寡言，却在某个瞬间让人心动'},
  {id:'hyunjae',name:'Hyunjae',kr:'현재',color:'#f59e0b',
   desc:'表面玩世不恭，实则极其认真，嘴硬心软',
   personality:'毒舌但护短，吃醋了绝对不会承认'},
  {id:'juyeon',name:'Juyeon',kr:'주연',color:'#ec4899',
   desc:'训练刻苦，不善表达情绪，用行动代替语言',
   personality:'沉默型，但行动比任何人都细腻体贴'},
  {id:'kevin',name:'Kevin',kr:'케빈',color:'#06b6d4',
   desc:'话多活泼，多语言能力者，但内心细腻敏感',
   personality:'外向但怕受伤，用活泼掩盖不安'},
  {id:'new',name:'New',kr:'뉴',color:'#6366f1',
   desc:'外表冷淡，偶尔流露真心，厨艺极好',
   personality:'冷面暖心，刀子嘴豆腐心'},
  {id:'q',name:'Q',kr:'큐',color:'#d946ef',
   desc:'艺术气质，喜欢观察别人，充满神秘感',
   personality:'艺术家敏感，能看穿别人情绪'},
  {id:'haknyeon',name:'Ju Haknyeon',kr:'주학년',color:'#14b8a6',
   desc:'努力克服过去，敏感而坚韧，格外珍惜身边的人',
   personality:'需要被认可，但给出的爱极深'},
  {id:'sunwoo',name:'Sunwoo',kr:'선우',color:'#f97316',
   desc:'直率毒舌，但对在乎的人极温柔',
   personality:'外冷内热，恋爱时反差萌'},
  {id:'eric',name:'Eric',kr:'에릭',color:'#a855f7',
   desc:'最年轻，爱闹但认真时让人心动',
   personality:'外表孩子气，内心比谁都成熟'}
];

const IDENTITIES = [
  {id:'barista',icon:'☕',title:'咖啡师',sub:'你在首尔梨泰院开了一家小咖啡店。\n某天一个戴帽子的男人走进来，点了一杯美式。'},
  {id:'writer',icon:'✍️',title:'文字工作者',sub:'你为某杂志写专栏，偶尔做娱乐圈边缘采访。\n你们在一次非正式发布会上擦肩而过。'},
  {id:'photo',icon:'📸',title:'摄影师',sub:'你是一名独立摄影师。\n经纪公司需要一名临时跟拍，你意外接到了这个工作。'},
  {id:'trainer',icon:'🎵',title:'音乐制作人',sub:'你为独立乐队做后期混音，偶尔接私活。\n他在录音室找到了你，说想尝试新风格。'},
  {id:'stylist',icon:'✂️',title:'助理造型师',sub:'你刚入行，在某设计师工作室做助理。\n你第一次的大工作，是给他们的新专辑视觉做造型协助。'}
];

// ══════════════════════════════════════════════════════
// STORY ENGINE
// ══════════════════════════════════════════════════════
// Each node: {id, type, content, choices}
// type: scene | msg_npc | msg_player | event | group | sms | phone | chapter | ending
// choices: [{text, hint, effects:{aff,trust,risk}, next}]
// effects applied to state before going next

function buildStory(memberId, memberName, memberKr, memberColor, identityId) {
  const ID = memberName;
  const KR = memberKr;
  const you = '你';
  const IDENTITY_INTROS = {
    barista:`梨泰院的雨季。你的小咖啡馆今天只有两桌客人。`,
    writer:`你约好了今天去采访一个不算知名的独立乐队，却走错了楼层。`,
    photo:`你背着相机包坐地铁，手边是刚刚接到的工作合同。`,
    trainer:`凌晨十二点，录音室的灯还亮着。`,
    stylist:`你拿着衣架和便利贴走进了你人生第一个大型艺人棚拍现场。`
  };
  const intro = IDENTITY_INTROS[identityId] || '首尔，某个普通的下午。';

  // Helper
  const npc = (text, aff=0, trust=0, risk=0, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'msg_npc', text, aff, trust, risk
  });
  const you_ = (text, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'msg_player', text
  });
  const scene = (text, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'scene', text
  });
  const ev = (evType, title, body, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'event', evType, title, body
  });
  const grp = (title, msgs, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'group', title, msgs
  });
  const sms = (time, messages, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'sms', time, messages
  });
  const phone_ = (status, transcript, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'phone', status, transcript
  });
  const choice = (text, hint, effects, next) => ({text, hint, effects, next});
  const chap = (num, title, sub, id='') => ({
    id: id||Math.random().toString(36).slice(2),
    type:'chapter', num, title, sub
  });

  const story = {
    nodes: {},
    start: 'ch1_start'
  };

  const add = (...nodes) => {
    nodes.forEach(n => { story.nodes[n.id] = n; });
  };

  // ══════════════════════════════════════
  // 身份路由 — 第1章入口
  // ══════════════════════════════════════
  add(
    { id:'ch1_start', type:'chapter_gate',
      chap:chap('第一章','偶然相遇','首尔，某个普通的下午，某些事情悄悄开始了'),
      next: identityId==='barista'  ? 'id_bar_1a'
          : identityId==='writer'   ? 'id_wri_1a'
          : identityId==='photo'    ? 'id_pho_1a'
          : identityId==='trainer'  ? 'id_tra_1a'
          :                           'id_sty_1a'
    }
  );

  // ══════════════════════════════════════
  // ☕ 身份A：咖啡师
  // ══════════════════════════════════════
  add(
    { id:'id_bar_1a', type:'seq', items:[
      scene('梨泰院，雨季。你的咖啡馆今天客人稀稀落落，窗玻璃上满是水雾。你用布擦了第三遍，想着今天大概就这样了。'),
      scene('门开了，带着一股湿润的空气。进来的人戴着棒球帽，帽檐压得很低，口袋里插着手，明显不想被认出来。但你还是认出了他。'),
      npc(`……这里有位子吗。`,3,0,0),
    ], choices:[
      choice('当然，随便坐。（若无其事）', 'trust', {aff:4,trust:7,risk:0}, 'id_bar_1b_calm'),
      choice('（假装没认出他）靠窗还有空位。', 'trust', {aff:3,trust:9,risk:0}, 'id_bar_1b_calm'),
      choice('你是……${ID}吧？', 'bold', {aff:2,trust:0,risk:6}, 'id_bar_1b_oops'),
    ]},

    { id:'id_bar_1b_calm', type:'seq', items:[
      scene('他摘下帽子，在角落坐下，扫了你一眼，像是在确认你不会骚扰他。你没有多说话，端了他点的美式过去，就走开了。'),
      npc(`……你不好奇？`,5,3,0),
      you_(`好奇什么？你只是一个客人。`),
      npc(`（轻轻笑了一下）……好。`,7,6,0),
      scene('他坐了将近一小时。走的时候把杯子推到了你这边，说了声谢谢。很普通的谢谢，但你莫名记住了他说话的语气。'),
    ], choices:[
      choice('（什么都没说，目送他离开）', 'trust', {aff:5,trust:8,risk:0}, 'id_bar_1c'),
      choice('（说）下次还来的话，我记你的口味。', 'sweet', {aff:9,trust:5,risk:0}, 'id_bar_1c'),
    ]},

    { id:'id_bar_1b_oops', type:'seq', items:[
      scene('他的表情变了，不是愤怒，是一种见怪不怪的疲倦。'),
      npc(`……能不能当作没看见我。`,0,-2,5),
      you_(`（停顿）……美式还是拿铁？`),
      scene('他愣了一下，然后若无其事坐下了。'),
      npc(`美式。（顿了顿）……谢谢。`,4,4,0),
    ], choices:[
      choice('（之后当他是普通客人，不再特别对待）', 'trust', {aff:4,trust:8,risk:-2}, 'id_bar_1c'),
      choice('（忍不住偷拍了一张发朋友圈）', 'risk', {aff:-5,trust:-8,risk:18}, 'id_bar_1c_bad'),
    ]},

    { id:'id_bar_1c_bad', type:'seq', items:[
      ev('⚠️ 舆论事件','照片意外流出','你以为朋友圈只有熟人看到。没想到两小时后，截图已经传开了。他的经纪人打来电话，语气很冷。他第二天没有再来。'),
      scene('那段时间你很后悔。你把朋友圈删了，但有些东西，删不掉。'),
    ], choices:[
      choice('（继续开店，等着，也许他还会来）', 'trust', {aff:-3,trust:-6,risk:6}, 'id_bar_2a'),
    ]},

    { id:'id_bar_1c', type:'seq', items:[
      scene('他走了。你擦了桌子，收了杯子，像往常一样关上灯。只是走到门口时，你停了一下。窗外还在下雨。'),
      scene('三天后，他又来了。'),
    ], choices:[
      choice('（像什么都没发生，正常迎客）', 'trust', {aff:5,trust:8,risk:0}, 'id_bar_2a'),
      choice('（有点紧张，手抖了一下）', 'sweet', {aff:8,trust:5,risk:0}, 'id_bar_2a'),
    ]},

    // 咖啡师 第二章
    { id:'id_bar_2a', type:'chapter_gate', chap:chap('第二章','常客','每周三，雨天居多。他总是在快关门前来。'), next:'id_bar_2b'},
    { id:'id_bar_2b', type:'seq', items:[
      scene('他开始每周来一两次，总是压着关门时间。你们逐渐有了不用开口就能理解的默契——他来，你端咖啡，他坐着，你忙你的。'),
      npc(`今天有什么推荐？`,5,3,0),
      you_(`埃塞俄比亚新豆，偏果酸，手冲。`),
      npc(`那来一杯。（停）你懂这些？`,4,4,0),
      you_(`开店的嘛，懂一点。`),
      npc(`（表情有点不一样）……有趣。`,6,5,0),
      scene('那天他多坐了一小时。临走时把空杯子推过来，低声说：'),
      npc(`……我叫${ID}。`,8,6,0),
      you_(`我知道。`),
      npc(`（轻声笑）那你叫什么？`,7,5,0),
      scene('你告诉了他你的名字。他重复了一遍，像是在记。'),
    ], choices:[
      choice('（心里有点说不清楚的感觉）', 'sweet', {aff:8,trust:6,risk:0}, 'id_bar_2c'),
      choice('（不动声色，继续擦桌子）', 'trust', {aff:5,trust:9,risk:0}, 'id_bar_2c'),
    ]},

    { id:'id_bar_2c', type:'seq', items:[
      sms('当天晚上 23:47',[
        {right:false,text:`今天的咖啡很好喝。`},
        {right:true, text:`……你怎么有我的号码？`},
        {right:false,text:`你收据上有联系方式，我存了。预约用的。`},
        {right:true, text:`……预约。`},
        {right:false,text:`对啊。`},
        {right:true, text:`（很久之后）……下周三。`},
        {right:false,text:`几点？`},
        {right:true, text:`关门前。`},
        {right:false,text:`知道了。`},
        {right:true, text:`……晚安。`},
      ]),
      scene('你盯着那条"晚安"，在黑暗里笑了很久。'),
    ], choices:[
      choice('（期待下周三）', 'sweet', {aff:10,trust:7,risk:0}, 'id_bar_3a'),
      choice('（告诉自己不要想太多）', 'trust', {aff:6,trust:9,risk:0}, 'id_bar_3a'),
    ]},

    // 咖啡师 第三章：吃醋
    { id:'id_bar_3a', type:'chapter_gate', chap:chap('第三章','多出来的人','有时候一个人走进来，整个空气都变了。'), next:'id_bar_3b'},
    { id:'id_bar_3b', type:'seq', items:[
      scene('那天他带了一个朋友，一个比他高、笑起来很好看的男生。一开口，英语韩语夹杂。'),
      npc(`（Kevin）哇这家店好可爱！${ID}哥你没骗我。老板你好！`,3,2,0),
      scene(`${ID}靠在椅背上没接话，只是看着你和Kevin说话，表情淡淡的，说不清是什么感觉。`),
      npc(`（${ID}，很平静）……她不是老板，是咖啡师。`,5,3,0),
      you_(`我两个都是。`),
      npc(`（Kevin）哈哈哈好喜欢！${ID}哥这朋友交得好啊。`,3,2,0),
      scene(`${ID}低下头，用手机屏幕挡了挡脸。`),
    ], choices:[
      choice('（对Kevin热情，聊了很多）', 'sweet', {aff:-3,trust:2,risk:3}, 'id_bar_3c_jeal'),
      choice('（对两人一视同仁，专业接待）', 'trust', {aff:3,trust:8,risk:0}, 'id_bar_3c_ok'),
      choice('（不经意间，眼神一直落在${ID}身上）', 'sweet', {aff:10,trust:5,risk:0}, 'id_bar_3c_ok'),
    ]},

    { id:'id_bar_3c_jeal', type:'seq', items:[
      sms('当晚 22:15',[
        {right:false,text:`那个Kevin，你们认识很久了吗？`},
        {right:true, text:`还好，一两年。`},
        {right:false,text:`他很有趣。`},
        {right:true, text:`……嗯。`},
        {right:false,text:`怎么了，不高兴？`},
        {right:true, text:`没有。（良久）……只是觉得你和他话比和我多。`},
        {right:false,text:`……你在吃醋啊。`},
        {right:true, text:`我没有。`},
        {right:false,text:`好好好，没有。`},
        {right:true, text:`……哼。`},
      ]),
      scene('你盯着那个"哼"字，在被窝里笑了很久。'),
    ], choices:[
      choice('（回复：其实我眼睛一直在看你）', 'sweet', {aff:14,trust:6,risk:0}, 'ch4_start'),
      choice('（回复：那你下次别带他来不就好了）', 'bold', {aff:10,trust:5,risk:2}, 'ch4_start'),
    ]},

    { id:'id_bar_3c_ok', type:'seq', items:[
      scene('Kevin走的时候多回头看了你几眼，说"好想再来"。'),
      scene(`${ID}走在他前面，没回头，但脚步快了一点。`),
      sms('当晚 23:02',[
        {right:false,text:`你朋友很有趣。`},
        {right:true, text:`嗯。`},
        {right:false,text:`你今天话好少。`},
        {right:true, text:`我一直话少。`},
        {right:false,text:`跟我说话的时候不少。`},
        {right:true, text:`……（沉默很久）睡了。晚安。`},
        {right:false,text:`……晚安。`},
      ]),
      scene('你盯着屏幕，想了很久，没想明白，也没想清楚。'),
    ], choices:[
      choice('（有点明白，但不敢深想）', 'sweet', {aff:10,trust:8,risk:0}, 'ch4_start'),
    ]}
  );

  // ══════════════════════════════════════
  // ✍️ 身份B：文字工作者
  // ══════════════════════════════════════
  add(
    { id:'id_wri_1a', type:'seq', items:[
      scene('你是一名专栏作者，偶尔接边缘娱乐圈的采访稿。今天你走错了楼层，按了错误的电梯，进了错误的走廊。'),
      scene('然后你推开了一扇本不该属于你的门。'),

    ], choices:[
      choice('（说）我也喜欢你。但我需要时间。', 'trust', {aff:12,trust:12,risk:2}, 'ending_soft'),
      choice('（说）我喜欢你。我早就喜欢了。', 'sweet', {aff:18,trust:12,risk:3}, 'ending_sweet'),
      choice('（说）我……不确定。我怕这段关系承受不了现实。', 'bold', {aff:7,trust:10,risk:0}, 'ending_apart'),
    ]}
  );

  // ── ENDINGS ──
  add(
    { id:'ending_sweet', type:'ending',
      badge:'♡', title:'与你同在',
      sub:'甜蜜结局',
      desc:`你说出了那句话。\n他听完，低下头，过了很久，才说：谢谢你。\n\n不是"我也是"，不是任何浪漫的回应。只是谢谢你。\n\n后来你才明白，对他来说，有人愿意接受他的全部处境，\n这两个字，已经是他能给出的最重的东西。\n\n他走了三个月。每隔几天，会发一条消息。\n不长，有时候是一张异国街道的照片，有时候只是一个字。\n但你知道，他每次打开对话框，都是想着你。\n\n他回来的那天，直接来了你的店。\n推开门，脱下帽子，坐在老地方。\n你端了咖啡过去，他的手握住了你的，没有放开。\n\n「我回来了。」\n「我知道。」`,
    },

    { id:'ending_soft', type:'ending',
      badge:'🌙', title:'慢慢来',
      sub:'温柔结局',
      desc:`你说，我需要时间。\n他说，好。\n\n那两个字，说得很轻，但很认真。\n\n他出发前，你们吃了一顿饭。没有说情话，没有催泪剧情。\n只是两个人坐在那家老拉面馆，把碗里的面吃完。\n\n他走了。你们还在发消息，比以前多，也比以前直接。\n他不再绕弯子，你也不再装冷静。\n\n三个月后，他回来了，站在你的门口，说：\n「想好了吗。」\n\n你说：「还差一点点。」\n他笑了：「没关系，我可以等。」\n\n这段关系没有正式的名字。\n但你们都知道，它在往某个地方走。`,

      badge:'✦', title:'就此告别',

      desc:`你说出了那句话：我怕这段关系承受不了现实。\n\n他听完，点了点头，表情很平静——\n是那种努力维持平静的样子。\n\n「……我能理解。」他说。「这本来就很难。」\n\n你们又坐了一会儿，说了些别的，天气，最近的事。\n快走的时候，他站起来，在门口停了一下。\n\n「我很高兴认识你。」\n\n你说：我也是。\n\n他走了，没有回头。\n\n你站在关上的门前，站了很久。\n\n有时候，两个人都用力了，还是走不到一起。\n不是谁的错。\n只是，现实太重。`,
    }
  );

  // Endings for bad paths
  add(
    { id:'ending_risk', type:'ending',
      badge:'◈', title:'公司介入',
      sub:'风险结局',
      desc:`风险值太高，公司这次不再只是打电话了。\n\n经纪人找他谈了话，说得很直接：\n「这段关系会影响你的形象，影响整个组合。」\n\n他沉默了三天，没有发消息。\n第四天，你收到了一条陌生号码发来的短信：\n「${ID}让我告诉你，他需要一段时间整理一下。希望你理解。」\n\n你把手机放下，去做了一杯咖啡，坐在空荡荡的店里，喝完了它。\n\n后来，他再也没有来过。\n你把那张写着「但我还是想来」的纸条，压在抽屉最深处，没有扔掉。\n\n也许有一天，时机成熟的时候，他会回来。\n也许不会。`,
    }
  );

  return story;
}

// ══════════════════════════════════════════════════════
// GAME STATE
// ══════════════════════════════════════════════════════
let G = {
  member: null,
  identity: null,
  story: null,
  cur: null,
  seqIdx: 0,
  aff: 20, trust: 20, risk: 10,
  chapter: 1,
  pendingChoices: null,
  saveMode: 'save'
};

function applyEffects(e) {
  if (!e) return;
  G.aff   = Math.max(0, Math.min(100, G.aff   + (e.aff||0)));
  G.trust = Math.max(0, Math.min(100, G.trust + (e.trust||0)));
  G.risk  = Math.max(0, Math.min(100, G.risk  + (e.risk||0)));
  updateStatBars();
}

function updateStatBars() {
  document.getElementById('fAff').style.width   = G.aff+'%';
  document.getElementById('fTrust').style.width = G.trust+'%';
  document.getElementById('fRisk').style.width  = G.risk+'%';
  document.getElementById('nAff').textContent   = G.aff;
  document.getElementById('nTrust').textContent = G.trust;
  document.getElementById('nRisk').textContent  = G.risk;
}

// ══════════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════════
function chat() { return document.getElementById('gChat'); }

function appendScene(text) {
  const d = document.createElement('div');
  d.className = 'scene-block';
  d.textContent = text;
  chat().appendChild(d);
  scrollDown();
}

function appendMsg(who, text, isPlayer, aff=0, trust=0, risk=0) {
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isPlayer ? 'player' : 'npc');

  const color = G.member ? G.member.color : '#3b82f6';
  const avi = document.createElement('div');
  avi.className = 'msg-avi';
  avi.style.background = isPlayer
    ? 'linear-gradient(135deg,#065f46,#047857)'
    : `linear-gradient(135deg,${color}88,${color})`;
  avi.textContent = isPlayer ? '我' : (G.member ? G.member.name[0] : '?');

  const body = document.createElement('div');
  body.className = 'msg-body';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  sender.textContent = who;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  let tags = '';
  if (aff>0)  tags += `<span class="stat-tag up">▲ 好感</span>`;
  if (aff<0)  tags += `<span class="stat-tag down">▼ 好感</span>`;
  if (trust>0) tags += `<span class="stat-tag up">▲ 信任</span>`;
  if (trust<0) tags += `<span class="stat-tag down">▼ 信任</span>`;
  if (risk>0)  tags += `<span class="stat-tag down">▲ 风险</span>`;

  body.appendChild(sender);
  body.appendChild(bubble);
  if (tags) {
    const td = document.createElement('div');
    td.className = 'stat-tags';
    td.innerHTML = tags;
    body.appendChild(td);
  }

  if (isPlayer) { row.appendChild(body); row.appendChild(avi); }
  else          { row.appendChild(avi);  row.appendChild(body); }

  chat().appendChild(row);
  scrollDown();
}

function appendEvent(evType, title, body) {
  const d = document.createElement('div');
  d.className = 'event-card';
  d.innerHTML = `<div class="ev-type">${evType}</div><div class="ev-title">${title}</div><div class="ev-body">${body}</div>`;
  chat().appendChild(d);
  scrollDown();
}

function appendGroup(title, msgs) {
  const wrapper = document.createElement('div');
  wrapper.innerHTML = `<div class="group-header">💬 ${title}</div>`;
  const body = document.createElement('div');
  body.className = 'group-body';
  msgs.forEach(m => {
    const row = document.createElement('div');
    row.className = 'group-msg';
    const mn = G.member ? G.member.name : '他';
    const txt = m.text.replace(/\$\{ID\}/g, mn);
    row.innerHTML = `<div class="group-msg-avi">${m.name[0]}</div><div class="group-msg-body"><div class="gm-name">${m.name}</div><div class="gm-text">${txt}</div></div>`;
    body.appendChild(row);
  });
  wrapper.appendChild(body);
  chat().appendChild(wrapper);
  scrollDown();
}

function appendSms(time, messages) {
  const d = document.createElement('div');
  d.className = 'sms-card';
  const mn = G.member ? G.member.name : '他';
  let html = `<div class="sms-time">${time}</div>`;
  messages.forEach(m => {
    const txt = m.text.replace(/\$\{ID\}/g, mn);
    html += `<div class="sms-row${m.right?' right':''}"><div class="sms-bubble">${txt}</div></div>`;
  });
  d.innerHTML = html;
  chat().appendChild(d);
  scrollDown();
}

function appendPhone(status, transcript) {
  const mn = G.member ? G.member.name : '他';
  const d = document.createElement('div');
  d.className = 'phone-card';
  let thtml = transcript.map(t => {
    const n = t.name.replace(/\$\{ID\}/g, mn);
    return `<b style="color:var(--blue3)">${n}：</b>${t.text}`;
  }).join('<br>');
  d.innerHTML = `<div class="phone-icon">📞</div><div class="phone-name">${mn}</div><div class="phone-status">${status}</div><div class="phone-transcript">${thtml}</div>`;
  chat().appendChild(d);
  scrollDown();
}

function scrollDown() {
  const c = chat();
  setTimeout(() => c.scrollTo({top:c.scrollHeight, behavior:'smooth'}), 60);
}

// ══════════════════════════════════════════════════════
// STORY RUNNER
// ══════════════════════════════════════════════════════
function showChapterOverlay(num, title, sub, cb) {
  const o = document.getElementById('chapterOverlay');
  document.getElementById('coNum').textContent = num;
  document.getElementById('coTitle').textContent = title;
  document.getElementById('coSub').textContent = sub;
  o.classList.add('show');
  setTimeout(() => {
    o.classList.remove('show');
    o.classList.add('hide');
    setTimeout(() => { o.classList.remove('hide'); if(cb)cb(); }, 500);
  }, 2200);
}

function gotoNode(id) {
  if (!id) return;
  // Check risk-based forced ending
  if (G.risk >= 85 && id !== 'ending_risk' && !id.startsWith('ending_')) {
    setTimeout(() => gotoNode('ending_risk'), 400);
    return;
  }
  const node = G.story.nodes[id];
  if (!node) { console.warn('Missing node:', id); return; }
  G.cur = node;
  G.seqIdx = 0;
  runNode(node);
}

function runNode(node) {
  if (node.type === 'chapter_gate') {
    const ch = node.chap;
    G.chapter = parseInt(ch.num.replace(/[^0-9]/g,'')) || G.chapter;
    document.getElementById('gChapter').textContent = ch.num + ' · ' + ch.title;
    showChapterOverlay(ch.num, ch.title, ch.sub, () => gotoNode(node.next));
    return;
  }

  if (node.type === 'seq') {
    runSeq(node);
    return;
  }

  if (node.type === 'ending') {
    showEnding(node);
    return;
  }
}

function runSeq(node) {
  if (G.seqIdx >= node.items.length) {
    // Show choices
    G.pendingChoices = node.choices;
    renderChoices(node.choices);
    return;
  }
  const item = node.items[G.seqIdx];
  G.seqIdx++;

  const mn = G.member ? G.member.name : '他';
  const kr = G.member ? G.member.kr : '';

  const replaceVars = t => t.replace(/\$\{ID\}/g, mn).replace(/\${ID}/g, mn);

  if (item.type === 'scene') {
    appendScene(replaceVars(item.text));
  } else if (item.type === 'msg_npc') {
    applyEffects({aff:item.aff,trust:item.trust,risk:item.risk});
    appendMsg(`${mn} ${kr}`, replaceVars(item.text), false, item.aff, item.trust, item.risk);
  } else if (item.type === 'msg_player') {
    appendMsg('你', replaceVars(item.text), true);
  } else if (item.type === 'event') {
    appendEvent(item.evType, item.title, replaceVars(item.body));
  } else if (item.type === 'group') {
    appendGroup(replaceVars(item.title), item.msgs);
  } else if (item.type === 'sms') {
    appendSms(item.time, item.messages);
  } else if (item.type === 'phone') {
    appendPhone(item.status, item.transcript);
  }

  // Auto-advance after delay
  const delay = (item.type === 'sms' || item.type === 'phone' || item.type === 'group') ? 700 : 380;
  setTimeout(() => runSeq(node), delay);
}

function renderChoices(choices) {
  const wrap = document.getElementById('choicesWrap');
  const list = document.getElementById('choicesList');
  list.innerHTML = '';

  const hintMap = {sweet:'hint-sweet',risk:'hint-risk',trust:'hint-trust',bold:'hint-bold'};
  const hintLabel = {sweet:'♡ 甜蜜',risk:'⚡ 风险',trust:'🤝 信任',bold:'✦ 大胆'};

  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const hClass = hintMap[c.hint]||'';
    const hText  = hintLabel[c.hint]||'';
    btn.innerHTML = `<span class="choice-num">${i+1}</span><span>${c.text}</span>${hText?`<span class="choice-hint ${hClass}">${hText}</span>`:''}`;
    btn.onclick = () => onChoice(c);
    list.appendChild(btn);
  });

  wrap.style.display = 'block';
  scrollDown();
}

function onChoice(c) {
  document.getElementById('choicesWrap').style.display = 'none';
  const mn = G.member ? G.member.name : '他';
  appendMsg('你', c.text.replace(/\$\{ID\}/g, mn), true);
  applyEffects(c.effects);
  setTimeout(() => gotoNode(c.next), 400);
}

function showEnding(node) {
  document.getElementById('eBadge').textContent = node.badge;
  document.getElementById('eTitle').textContent = node.title;
  document.getElementById('eSub').textContent   = node.sub;
  document.getElementById('eDesc').textContent  = node.desc;
  document.getElementById('eFinal1').textContent = G.aff;
  document.getElementById('eFinal2').textContent = G.trust;
  document.getElementById('eFinal3').textContent = G.chapter;
  document.getElementById('choicesWrap').style.display = 'none';
  setTimeout(() => goTo('s-ending'), 600);
}

// ══════════════════════════════════════════════════════
// SETUP
// ══════════════════════════════════════════════════════
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });
  const s = document.getElementById(id);
  s.style.display = 'flex';
  setTimeout(() => s.classList.add('active'), 10);
}

function confirmMember() {
  if (!G.member) return;
  goTo('s-identity');
}

function startGame() {
  if (!G.member || !G.identity) return;
  G.story = buildStory(G.member.id, G.member.name, G.member.kr, G.member.color, G.identity.id);
  G.aff=20; G.trust=20; G.risk=10; G.chapter=1;
  document.getElementById('gMemberName').textContent = G.member.name + ' ' + G.member.kr;
  document.getElementById('gChapter').textContent = '第一章';
  updateStatBars();
  chat().innerHTML = '';
  goTo('s-game');
  setTimeout(() => gotoNode(G.story.start), 300);
}

function confirmRestart() {
  if (confirm('确定要重新开始吗？当前进度将不会自动保存。')) hardRestart();
}

function hardRestart() {
  G = {member:null,identity:null,story:null,cur:null,seqIdx:0,aff:20,trust:20,risk:10,chapter:1,pendingChoices:null,saveMode:'save'};
  document.querySelectorAll('.member-card').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.identity-item').forEach(c=>c.classList.remove('sel'));
  document.getElementById('btnConfirmMember').disabled = true;
  document.getElementById('btnConfirmId').disabled = true;
  goTo('s-title');
}

// ══════════════════════════════════════════════════════
// SAVE / LOAD
// ══════════════════════════════════════════════════════
function showSave(mode) {
  G.saveMode = mode;
  document.getElementById('saveModeLabel').textContent = mode==='save'?'保存':'读取';
  document.getElementById('saveTitle').textContent = mode==='save'?'保存进度':'读取存档';
  renderSlots(mode);
  goTo('s-save');
}

function renderSlots(mode) {
  const list = document.getElementById('slotList');
  list.innerHTML = '';
  for (let i=1;i<=3;i++) {
    const raw = localStorage.getItem('tbz_save_'+i);
    const slot = document.createElement('div');
    slot.className = 'save-slot';
    if (raw) {
      const d = JSON.parse(raw);
      slot.innerHTML = `<div class="slot-icon">💾</div><div class="slot-info"><div class="slot-title">槽位 ${i} · ${d.memberName}</div><div class="slot-meta">第${d.chapter}章 · 好感${d.aff} · ${d.date}</div></div><div class="slot-action">${mode==='save'?'覆盖':'读取'}</div>`;
    } else {
      slot.innerHTML = `<div class="slot-icon">⬜</div><div class="slot-info"><div class="slot-title">槽位 ${i}</div><div class="slot-meta">空档案</div></div><div class="slot-action">${mode==='save'?'保存':'-'}</div>`;
    }
    slot.onclick = () => {
      if (mode==='save') saveSlot(i);
      else if (raw) loadSlot(i);
    };
    list.appendChild(slot);
  }
}

function saveSlot(i) {
  if (!G.member) return;
  const data = {
    memberName: G.member.name,
    memberId: G.member.id,
    identityId: G.identity ? G.identity.id : '',
    chapter: G.chapter,
    aff: G.aff, trust: G.trust, risk: G.risk,
    curNodeId: G.cur ? G.cur.id : G.story.start,
    date: new Date().toLocaleDateString('zh-CN')
  };
  localStorage.setItem('tbz_save_'+i, JSON.stringify(data));
  renderSlots('save');
  alert('已保存到槽位'+i);
}

function loadSlot(i) {
  const raw = localStorage.getItem('tbz_save_'+i);
  if (!raw) return;
  const d = JSON.parse(raw);
  G.member = MEMBERS.find(m=>m.id===d.memberId) || MEMBERS[0];
  G.identity = IDENTITIES.find(id=>id.id===d.identityId) || IDENTITIES[0];
  G.aff=d.aff; G.trust=d.trust; G.risk=d.risk; G.chapter=d.chapter;
  G.story = buildStory(G.member.id, G.member.name, G.member.kr, G.member.color, G.identity.id);
  document.getElementById('gMemberName').textContent = G.member.name+' '+G.member.kr;
  document.getElementById('gChapter').textContent = '第'+d.chapter+'章';
  updateStatBars();
  chat().innerHTML = '';
  goTo('s-game');
  setTimeout(() => gotoNode(d.curNodeId||G.story.start), 300);
}

// ══════════════════════════════════════════════════════
// INIT UI
// ══════════════════════════════════════════════════════
function initMemberGrid() {
  const grid = document.getElementById('memberGrid');
  MEMBERS.forEach(m => {
    const c = document.createElement('div');
    c.className = 'member-card';
    c.innerHTML = `<div class="mc-check">✓</div><div class="mc-name">${m.name}</div><div class="mc-kr">${m.kr}</div><div class="mc-desc">${m.desc}</div>`;
    c.onclick = () => {
      document.querySelectorAll('.member-card').forEach(x=>x.classList.remove('sel'));
      c.classList.add('sel');
      G.member = m;
      document.getElementById('btnConfirmMember').disabled = false;
    };
    grid.appendChild(c);
  });
}

function initIdentityList() {
  const list = document.getElementById('identityList');
  IDENTITIES.forEach(id => {
    const item = document.createElement('div');
    item.className = 'identity-item';
    item.innerHTML = `<div class="ii-icon">${id.icon}</div><div class="ii-text"><div class="ii-title">${id.title}</div><div class="ii-sub">${id.sub}</div></div>`;
    item.onclick = () => {
      document.querySelectorAll('.identity-item').forEach(x=>x.classList.remove('sel'));
      item.classList.add('sel');
      G.identity = id;
      document.getElementById('btnConfirmId').disabled = false;
    };
    list.appendChild(item);
  });
}

function initStars() {
  const c = document.getElementById('titleStars');
  for (let i=0;i<60;i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
      --d:${2+Math.random()*4}s;--del:${Math.random()*3}s;
      opacity:${.1+Math.random()*.5};`;
    c.appendChild(s);
  }
}

// Boot
initStars();
initMemberGrid();
initIdentityList();
// Ensure all screens hidden except title
document.querySelectorAll('.screen').forEach(s => {
  if (s.id !== 's-title') { s.style.display='none'; s.classList.remove('active'); }
});
